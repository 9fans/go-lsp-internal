on: [push, pull_request]
name: Test

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ '1.25', '1.26' ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}

    - name: Check formatting
      run: |
        fmt_files=$(gofmt -l .)
        if [ -n "$fmt_files" ]; then
          echo "Go files are not formatted:"
          echo "$fmt_files"
          exit 1
        fi

    - name: Build (linux)
      run: go build -v ./...

    - name: Build (windows)
      run: GOOS=windows go build -v ./...

    - name: Build (plan9)
      run: GOOS=plan9 go build -v ./...

    - name: Run tests
      run: go test -race -v ./...
